<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkingKaspa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <div class="navbar__brand">
      <span class="navbar__logo-icon">P</span>
      <span class="navbar__logo-text">Parking<span class="navbar__logo-accent">Kaspa</span></span>
    </div>
    <div class="navbar__wallet" id="wallet-bar"></div>
  </header>

  <div id="toast-container" class="toast-container"></div>

  <main class="app-layout">
    <div class="map-panel">
      <div id="map" class="map"></div>
    </div>
    <aside class="spots-panel">
      <div class="spots-panel__header">
        <h2 class="spots-panel__title">Available Spots</h2>
        <span class="spots-panel__count" id="spots-count"></span>
      </div>
      <div class="spots-panel__list" id="spots"></div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
